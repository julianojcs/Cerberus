# Infraestrutura de desenvolvimento local do Cerberus.
# Espelha (de forma simplificada) a topologia de produção: banco + broker.
# Produção DTI substitui por MongoDB Replica Set (3 VMs) e EMQX/Mosquitto on-prem.
services:
  mongo:
    image: mongo:7
    container_name: cerberus-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: cerberus-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT (agentes / ponte da API)
      - "9001:9001"   # MQTT sobre WebSockets (dashboard)
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log

volumes:
  mongo-data:
  mosquitto-data:
  mosquitto-log:
