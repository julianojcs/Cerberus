# Configuração do broker Mosquitto para DESENVOLVIMENTO LOCAL.
# ATENÇÃO: allow_anonymous está habilitado apenas para o MVP local.
# Em produção (DTI) usa-se autenticação por JWT + ACLs de tópico
# (mosquitto-go-auth / EMQX), TLS 1.3 e certificados ICP-Brasil.

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning

# Listener MQTT nativo (agentes móveis + ponte da API)
listener 1883 0.0.0.0
protocol mqtt

# Listener MQTT sobre WebSockets (dashboard plota em tempo real via browser)
listener 9001 0.0.0.0
protocol websockets

# DEV apenas — liberado sem credenciais. NÃO usar em produção.
allow_anonymous true
