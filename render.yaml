# Render Blueprint — API do Cerberus (MVP custo-zero: Render + Atlas M0 + HiveMQ).
# Uso: no Render, New > Blueprint, aponte para este repositório. Depois preencha os
# segredos marcados `sync: false` (não versionados) no painel do serviço.
# Passo a passo completo: docs/runbooks/deploy-mvp.md
services:
  - type: web
    name: cerberus-api
    runtime: docker
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: . # raiz do repo (o Dockerfile compila o monorepo)
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000 # a API lê PORT do ambiente (config/env.ts)
      - key: API_HOST
        value: 0.0.0.0
      # Origens do dashboard publicado (separadas por vírgula). Ex.:
      # https://cerberus-dashboard.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # mongodb+srv://<user>:<pass>@<cluster>/cerberus (MongoDB Atlas M0)
      - key: MONGO_URI
        sync: false
      # mqtts://<cluster>.s1.eu.hivemq.cloud:8883 (HiveMQ Cloud, TLS)
      - key: MQTT_BROKER_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_CLIENT_ID
        value: cerberus_api_node
      # Segredo de assinatura do JWT — gerado uma vez pelo Render (forte, estável).
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
