name: CI

# Validação automática em PR (e em pushes para main).
# Gates: build -> typecheck -> test (Vitest). Lint entra como informativo até o
# ESLint do dashboard ser configurado (entrega da Fase 0 — issue #2).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela execuções antigas do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Menor privilégio (alinhado à postura Zero Trust do projeto).
permissions:
  contents: read

jobs:
  validate:
    name: build · typecheck · test · lint · format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Workspaces: packages/*, apps/api, apps/dashboard.
      # apps/mobile (Expo) roda fora do CI (build nativo via EAS).
      - name: Install dependencies
        run: npm ci

      # turbo respeita a ordem de dependências (^build): compila @cerberus/shared
      # antes das apps que o consomem.
      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test (Vitest)
        run: npm run test

      # ESLint flat config (typescript-eslint) — bloqueante.
      - name: Lint (ESLint)
        run: npm run lint

      # Prettier — verificação de formatação (bloqueante).
      - name: Format (Prettier)
        run: npm run format:check

  e2e:
    name: e2e dashboard (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # O `next build` do dashboard consome @cerberus/shared já compilado.
      - name: Build shared
        run: npm run shared:build

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      # O webServer do Playwright faz build+start do dashboard; o broker MQTT-WS
      # e os mocks REST são in-process — sem backend nem Docker.
      - name: E2E (dashboard)
        run: npm run test:e2e --workspace @cerberus/dashboard

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/dashboard/playwright-report/
          retention-days: 7
